<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    
    <!-- Primary Meta Tags -->
    <title>Work HuB - Enterprise Workforce Management Platform</title>
    <meta name="title" content="Work HuB - Enterprise Workforce Management Platform" />
    <meta name="description" content="Complete enterprise workforce management solution with tasks, payroll, attendance, leave, shifts, analytics, and performance tracking. Professional HRMS platform." />
    <meta name="author" content="Work HuB" />
    <meta name="keywords" content="workforce management, task management, payroll, attendance tracking, leave management, shift scheduling, team collaboration, HRMS, performance management, analytics, enterprise" />
    
    <!-- Favicon -->
    <link rel="icon" href="/workhub-favicon.png" type="image/png">
    <link rel="shortcut icon" href="/workhub-favicon.png" type="image/png">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sltworkhub.com" />
    <meta property="og:title" content="SLT Work Hub - All-in-One Workforce Management Platform" />
    <meta property="og:description" content="Manage tasks, attendance, leave, shifts, performance, and team collaboration in one unified platform. Award coins, track productivity, and streamline approvals." />
    <meta property="og:image" content="/workhub-og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="SLT Work Hub" />
    <meta property="og:locale" content="en_US" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://sltworkhub.com" />
    <meta name="twitter:title" content="SLT Work Hub - Workforce Management Platform" />
    <meta name="twitter:description" content="Complete workforce management: Tasks, Attendance, Leave, Performance, Coins & More." />
    <meta name="twitter:image" content="/workhub-twitter-card.png" />
    <meta name="twitter:creator" content="@SLTWorkHub" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://sltworkhub.com" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#10b981" />
    <meta name="msapplication-TileColor" content="#10b981" />
    
    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Work Hub" />
    
    <!-- Apple Touch Icons (Multiple Sizes) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/workhub-icon-180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/workhub-icon-152.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/workhub-icon-120.png" />
    <link rel="apple-touch-icon" sizes="76x76" href="/workhub-icon-76.png" />
    <link rel="apple-touch-icon" href="/workhub-icon.png" />
    
    <!-- Microsoft Tiles -->
    <meta name="msapplication-TileImage" content="/workhub-icon-144.png" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
    
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />
    
    <!-- Preconnect for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Robots -->
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />
    
    <!-- Additional SEO -->
    <meta name="rating" content="general" />
    <meta name="distribution" content="global" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Structured Data for SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "SLT Work Hub",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web, iOS, Android",
      "description": "Complete workforce management platform with tasks, attendance, leave, performance tracking, and reward system",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "INR"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "250"
      },
      "author": {
        "@type": "Organization",
        "name": "SLT Finance India"
      }
    }
    </script>
  </body>
</html>
